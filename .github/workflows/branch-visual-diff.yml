name: Branch Visual Diff

on:
  pull_request:
  workflow_dispatch:
    inputs:
      baseline_branch:
        description: Branch to use as baseline snapshots source.
        required: false
        default: main
      report_branch:
        description: Branch to use for report/diff snapshots source.
        required: false
      fail_on_changes:
        description: Fail workflow when changed snapshots are detected.
        type: boolean
        required: false
        default: false

concurrency:
  group: visual-diff-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  visual-diff:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout workflow branch
        uses: actions/checkout@v6

      - name: Resolve baseline/report refs
        id: refs
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASELINE_REF="${{ github.base_ref }}"
            REPORT_REF="${{ github.head_ref }}"
          else
            BASELINE_REF="${{ inputs.baseline_branch }}"
            REPORT_REF="${{ inputs.report_branch }}"

            if [[ -z "$BASELINE_REF" ]]; then
              BASELINE_REF="main"
            fi

            if [[ -z "$REPORT_REF" ]]; then
              REPORT_REF="${{ github.ref_name }}"
            fi
          fi

          echo "baseline_ref=$BASELINE_REF" >> "$GITHUB_OUTPUT"
          echo "report_ref=$REPORT_REF" >> "$GITHUB_OUTPUT"
          echo "Using baseline=$BASELINE_REF report=$REPORT_REF"

      - name: Checkout report branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.refs.outputs.report_ref }}
          path: report-src

      - name: Checkout baseline branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.refs.outputs.baseline_ref }}
          path: baseline-src

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            report-src/package-lock.json
            report-src/test-storybook/package-lock.json
            baseline-src/test-storybook/package-lock.json

      - name: Install report branch dependencies
        working-directory: report-src
        run: npm ci

      - name: Install Playwright browsers
        working-directory: report-src
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Install report branch test Storybook dependencies
        working-directory: report-src/test-storybook
        run: npm ci

      - name: Install baseline branch test Storybook dependencies
        working-directory: baseline-src/test-storybook
        run: npm ci

      - name: Capture baseline snapshots from baseline branch (all browsers)
        shell: bash
        env:
          MODE: baseline
          STORYBOOK_DIR: baseline-src/test-storybook
          TOOL_DIR: report-src
          BROWSERS: chromium,firefox,webkit
          STORY_CONCURRENCY: 4
          BROWSER_CONCURRENCY: 3
        run: |
          set -euo pipefail
          CURRENT_DIR="$RUNNER_TEMP/current-baseline" \
          BASELINE_DIR="$RUNNER_TEMP/baseline" \
          bash scripts/ci-capture.sh

      - name: Capture report snapshots from report branch (all browsers)
        shell: bash
        env:
          MODE: report
          STORYBOOK_DIR: report-src/test-storybook
          TOOL_DIR: report-src
          BROWSERS: chromium,firefox,webkit
          STORY_CONCURRENCY: 4
          BROWSER_CONCURRENCY: 3
        run: |
          set -euo pipefail
          CURRENT_DIR="$RUNNER_TEMP/current-report" \
          BASELINE_DIR="$RUNNER_TEMP/baseline" \
          REPORT_DIR="$RUNNER_TEMP/report" \
          bash scripts/ci-capture.sh

      - name: Build report summary
        id: summary
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const report = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/report/report.json`, "utf8"));
          const summary = report.summary ?? {};
          const changed = Number(summary.changed ?? 0);
          const output = process.env.GITHUB_OUTPUT;
          const stepSummary = process.env.GITHUB_STEP_SUMMARY;
          fs.appendFileSync(output, `changed=${changed}\n`);
          fs.appendFileSync(stepSummary, [
            "## Visual Diff Summary",
            "",
            `- Browsers: \`chromium, firefox, webkit\``,
            `- Baseline branch: \`${process.env.BASELINE_REF}\``,
            `- Report branch: \`${process.env.REPORT_REF}\``,
            `- Total snapshots: \`${summary.total ?? 0}\``,
            `- Changed: \`${summary.changed ?? 0}\``,
            `- Unchanged: \`${summary.unchanged ?? 0}\``,
            `- Missing baseline: \`${summary.missingBaseline ?? 0}\``,
            `- Missing current: \`${summary.missingCurrent ?? 0}\``,
            `- Dimension mismatch: \`${summary.dimensionMismatch ?? 0}\``,
            `- Errors: \`${summary.errors ?? 0}\``,
          ].join("\n") + "\n");
          NODE
        env:
          BASELINE_REF: ${{ steps.refs.outputs.baseline_ref }}
          REPORT_REF: ${{ steps.refs.outputs.report_ref }}

      - name: Upload visual diff report artifact
        uses: actions/upload-artifact@v6
        with:
          name: visual-diff-report
          path: ${{ runner.temp }}/report
          if-no-files-found: error
          retention-days: 14

      - name: Prepare GitHub Pages content
        id: pages
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
        shell: bash
        run: |
          set -euo pipefail

          BASE_PATH="visual-diffs"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            REPORT_SUBPATH="${BASE_PATH}/pr-${{ github.event.pull_request.number }}/run-${{ github.run_id }}"
          else
            SAFE_REF="$(echo "${{ github.ref_name }}" | tr -cs '[:alnum:]._-' '-')"
            REPORT_SUBPATH="${BASE_PATH}/manual/${SAFE_REF}/run-${{ github.run_id }}"
          fi

          PUBLISH_ROOT="${RUNNER_TEMP}/pages"
          DEST_DIR="${PUBLISH_ROOT}/${REPORT_SUBPATH}"
          mkdir -p "$DEST_DIR"
          cp -R "${RUNNER_TEMP}/report/." "$DEST_DIR/"

          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO_NAME" == "${OWNER}.github.io" ]]; then
            BASE_URL="https://${OWNER}.github.io"
          else
            BASE_URL="https://${OWNER}.github.io/${REPO_NAME}"
          fi
          REPORT_URL="${BASE_URL}/${REPORT_SUBPATH}/index.html"

          echo "report_subpath=${REPORT_SUBPATH}" >> "$GITHUB_OUTPUT"
          echo "report_url=${REPORT_URL}" >> "$GITHUB_OUTPUT"

          {
            echo ""
            echo "## Visual Diff Report"
            echo ""
            echo "- Browsers: \`chromium, firefox, webkit\`"
            echo "- Live report: ${REPORT_URL}"
            echo "- Published path: \`${REPORT_SUBPATH}\`"
            echo ""
            echo "> GitHub Pages publish can take up to a minute after deploy."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy report to GitHub Pages (gh-pages)
        if: ${{ steps.pages.outputs.report_subpath != '' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ${{ runner.temp }}/pages
          keep_files: true
          enable_jekyll: false

      - name: Comment live report URL on pull request
        if: ${{ github.event_name == 'pull_request' && steps.pages.outputs.report_url != '' }}
        uses: actions/github-script@v8
        env:
          REPORT_URL: ${{ steps.pages.outputs.report_url }}
          REPORT_SUBPATH: ${{ steps.pages.outputs.report_subpath }}
        with:
          script: |
            const marker = "<!-- visual-diff-report-link -->";
            const body = [
              marker,
              "## Visual Diff Report",
              "",
              "- Browsers: `chromium, firefox, webkit`",
              `- Live report: ${process.env.REPORT_URL}`,
              `- Published path: \`${process.env.REPORT_SUBPATH}\``,
              "",
              "_GitHub Pages publish may take up to a minute after the workflow finishes._",
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail when changes detected
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.fail_on_changes && steps.summary.outputs.changed != '0' }}
        run: |
          echo "Snapshot changes detected: ${{ steps.summary.outputs.changed }}"
          exit 1
