<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UVA Visual Snapshots Report</title>
    <style>
:root {
  --bg: #f4efe8;
  --panel: #ffffff;
  --panel-alt: #f7faf3;
  --text: #23211d;
  --muted: #6f675f;
  --accent: #155e63;
  --warn: #9a3412;
  --line: #ddd3c7;
  --ok: #166534;
}

* {
  box-sizing: border-box;
}
html,
body {
  margin: 0;
  font-family: "Space Grotesk", "Segoe UI", sans-serif;
  color: var(--text);
  background: radial-gradient(circle at 15% 10%, #fdf7ed 0%, var(--bg) 58%, #ece6dd 100%);
}
.layout {
  display: grid;
  grid-template-columns: 340px 1fr;
  min-height: 100vh;
}

.sidebar {
  border-right: 1px solid var(--line);
  padding: 16px;
  background: linear-gradient(180deg, #fffaf3 0%, #f3ede5 100%);
  display: grid;
  grid-template-rows: auto auto auto auto auto 1fr;
  gap: 10px;
  min-height: 0;
}

.sidebar h1 {
  margin: 0;
  font-size: 1.1rem;
}
.summary {
  margin: 0;
  color: var(--muted);
  font-size: 0.9rem;
  line-height: 1.45;
}
.toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--text);
  font-size: 0.8rem;
  padding: 6px 10px;
  cursor: pointer;
}

.btn:hover {
  border-color: var(--accent);
}
.btn:disabled {
  opacity: 0.55;
  cursor: not-allowed;
}
.btn-primary {
  border-color: #8ad7de;
  background: #ecfbfc;
  color: var(--accent);
}
.btn-ok {
  border-color: #bbe3c0;
  background: #effaf0;
  color: var(--ok);
}
.btn-warn {
  border-color: #f6d7c2;
  background: #fff4eb;
  color: var(--warn);
}

.filter {
  border: 1px solid var(--line);
  border-radius: 999px;
  background: #fff;
  color: var(--text);
  font-size: 0.78rem;
  padding: 5px 10px;
  cursor: pointer;
}

.filter.active {
  border-color: var(--accent);
  background: #ecfbfc;
  color: var(--accent);
}

.status-text {
  font-size: 0.78rem;
  color: var(--muted);
  min-height: 1.1rem;
}

.list {
  display: grid;
  gap: 8px;
  overflow: auto;
  align-content: start;
  min-height: 0;
}

.item {
  width: 100%;
  text-align: left;
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  transition:
    transform 120ms ease,
    border-color 120ms ease;
}

.item:hover {
  transform: translateY(-1px);
  border-color: var(--accent);
}
.item.active {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(21, 94, 99, 0.15);
}
.item .name {
  display: block;
  font-size: 0.88rem;
  margin-bottom: 4px;
}
.item .item-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.item .cross-pill {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 0.65rem;
  line-height: 1.2;
  border: 1px solid var(--line);
  background: #f8f5ef;
  color: var(--muted);
  white-space: nowrap;
}
.item .cross-pill.diff {
  border-color: #ef9a9a;
  background: #fff1f1;
  color: #b42318;
}
.item .cross-pill.same {
  border-color: #bbe3c0;
  background: #effaf0;
  color: var(--ok);
}
.item .cross-pill.size {
  border-color: #f6d7c2;
  background: #fff4eb;
  color: var(--warn);
}
.item .cross-pill.loading {
  border-color: #8ad7de;
  background: #ecfbfc;
  color: var(--accent);
}
.item .cross-pill.na {
  opacity: 0.7;
}
.item .browser-health-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
}
.item .browser-health-chip {
  display: inline-block;
  font-size: 0.68rem;
  line-height: 1;
  border-radius: 999px;
  padding: 4px 7px;
  border: 1px solid var(--line);
  background: #f7f4ee;
  color: var(--muted);
}
.item .browser-health-chip.muted {
  opacity: 0.6;
}
.item .badge {
  display: inline-block;
  font-size: 0.72rem;
  color: var(--warn);
  background: #fff4eb;
  border: 1px solid #f6d7c2;
  border-radius: 999px;
  padding: 2px 8px;
  text-transform: lowercase;
}

.item .badge.ok {
  color: var(--ok);
  background: #effaf0;
  border-color: #bbe3c0;
}

.main {
  padding: 18px;
  display: grid;
  gap: 14px;
}
.title-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: baseline;
  justify-content: space-between;
}
.title-row h2 {
  margin: 0;
  font-size: 1rem;
}
.title-row .meta {
  color: var(--muted);
  font-size: 0.82rem;
}
.entry-actions {
  display: flex;
  gap: 8px;
}
.cross-matrix {
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--panel);
  padding: 10px;
  display: grid;
  gap: 10px;
}
.cross-matrix-head h3 {
  margin: 0;
  font-size: 0.92rem;
}
.cross-matrix-head .metrics {
  margin-top: 6px;
}
.cross-table {
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
}
.cross-row {
  display: grid;
  grid-template-columns: minmax(260px, 1fr) repeat(4, minmax(72px, auto));
  gap: 8px;
  align-items: center;
  padding: 8px 10px;
  border-top: 1px solid var(--line);
  font-size: 0.8rem;
}
.cross-row:first-child {
  border-top: 0;
}
.cross-row-head {
  background: #faf6ef;
  font-size: 0.74rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
}
.cross-story-label {
  font-weight: 500;
  color: var(--text);
}
.cross-cell {
  display: inline-block;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 3px 7px;
  text-align: center;
  font-variant-numeric: tabular-nums;
  color: var(--muted);
  background: #f8f5ef;
}
.cross-cell.heat-low {
  border-color: #bbe3c0;
  background: #effaf0;
  color: var(--ok);
}
.cross-cell.heat-medium {
  border-color: #f6d7c2;
  background: #fff4eb;
  color: var(--warn);
}
.cross-cell.heat-high {
  border-color: #ef9a9a;
  background: #fff1f1;
  color: #b42318;
}

.images {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.card {
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--panel);
  padding: 10px;
  min-height: 360px;
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 8px;
}

.card h3 {
  margin: 0;
  font-size: 0.86rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.card .viewport {
  display: grid;
  place-items: center;
  border: 1px dashed var(--line);
  border-radius: 8px;
  overflow: auto;
  background: var(--panel-alt);
}
.card img {
  max-width: 100%;
  height: auto;
  display: block;
}
.empty {
  color: var(--muted);
  font-size: 0.9rem;
  padding: 20px;
  text-align: center;
}

.diff {
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--panel);
  padding: 10px;
  display: grid;
  gap: 8px;
}

.diff-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.diff-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.diff h3 {
  margin: 0;
  font-size: 0.86rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.diff .viewport {
  display: grid;
  place-items: center;
  border: 1px dashed var(--line);
  border-radius: 8px;
  overflow: auto;
  background: var(--panel-alt);
  min-height: 220px;
}
.diff-stage {
  position: relative;
  max-width: 100%;
}
.diff-stage img {
  max-width: 100%;
  height: auto;
  display: block;
}
.diff-stage .layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
#diff-base-img {
  position: relative;
  z-index: 1;
}
#diff-pixels-img {
  z-index: 2;
}
#cross-diff-overlay-img {
  z-index: 2;
  mix-blend-mode: screen;
  animation: cross-diff-pulse 1.1s ease-in-out infinite;
}
#diff-focus-mask-img {
  z-index: 3;
}
#diff-pixels-img.zap-red {
  filter: saturate(1.25) hue-rotate(0deg);
}
#diff-pixels-img.zap-green {
  filter: saturate(1.25) hue-rotate(120deg);
}
#btn-toggle-diff[aria-pressed="false"] {
  border-color: var(--line);
  background: var(--panel);
  color: var(--muted);
}
#btn-focus-diff[aria-pressed="false"] {
  border-color: var(--line);
  background: var(--panel);
  color: var(--muted);
}
#btn-zap-diff[aria-pressed="false"] {
  border-color: var(--line);
  background: var(--panel);
  color: var(--muted);
}
.metrics {
  color: var(--muted);
  font-size: 0.85rem;
  margin: 0;
}

@keyframes cross-diff-pulse {
  0% {
    opacity: 0.82;
  }
  50% {
    opacity: 1;
  }
  100% {
    opacity: 0.82;
  }
}

@media (max-width: 980px) {
  .layout {
    grid-template-columns: 1fr;
  }
  .sidebar {
    border-right: 0;
    border-bottom: 1px solid var(--line);
  }
  .images {
    grid-template-columns: 1fr;
  }
  .title-row {
    align-items: flex-start;
  }
  .cross-row {
    grid-template-columns: minmax(160px, 1fr) repeat(4, minmax(60px, auto));
    font-size: 0.74rem;
  }
}

</style>
